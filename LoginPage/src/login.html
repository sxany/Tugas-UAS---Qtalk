<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
  
            
        }

        .login-card {
            background-color: #ffffff;
            padding: 30px 40px;
            border-radius: 12px;
            box-shadow: 12px 12px 12px rgba(0, 0, 0, 0.1);
            text-align: left;
            width: 320px;
        }

        h1 {
            margin-top: 0;
            margin-bottom: 24px;
            font-size: 24px;
            text-align: center;
        }

        .input-group {
            margin-bottom: 16px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-size: 14px;
            font-weight: 500;
        }

        input {
            width: 100%;
            padding: 10px;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        input:focus {
            outline: none;

            box-shadow: 0 0 5px rgba(147, 112, 219, 0.3);
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: #8a63bd;
            color: rgb(255, 255, 255);
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            transition: background-color 0.3s ease;
        }

        button:hover {
            background-color: #724da3; 
        }

        p {
            text-align: center;
            font-size: 13px;
            color: #666666;
            margin-top: 20px;
            margin-bottom: 0;
        }

        a {
            color: #8a63bd;
            text-decoration: none;
            font-weight: 600;
        }

        a:hover {
            text-decoration: underline;
        }
    </style>

</head>
<body>
    <div class="login-card">
        <h1>Login Disini</h1>
        <form action="../login.php" method="POST">
            <div class="input-group">
                <label for="username">Username:</label>
                <input type="text" id="username" name="username" required>
            </div>

            <div class="input-group">
                <label for="password">Password:</label>
                <input type="password" id="password" name="password" required>
            </div>

            <button type="submit">Login</button>
            <p>Belum punya akun? <a href="index.html">Daftar di sini</a></p>
        </form>
    </div>
</body>
</html>
